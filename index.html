<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Deadlands: Конструктор врагов</title>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="app-header">
        <div>
          <p class="kicker">Deadlands / SWADE</p>
          <h1>Конструктор врагов</h1>
        </div>
        <div class="header-actions no-print">
          <button type="button" data-action="copyBlock" title="Скопировать статблок">Копировать</button>
          <button type="button" data-action="print" title="Печать">Печать</button>
          <button type="button" data-action="export" title="Сохранить JSON">Экспорт</button>
          <label class="file-button" title="Загрузить JSON">
            Импорт
            <input type="file" accept="application/json" data-action="import" />
          </label>
        </div>
      </header>

      <section class="toolbar paper no-print">
        <label>
          <span>Шаблон</span>
          <select data-action="preset">
            <option value="">Своя тварь</option>
          </select>
        </label>
        <button type="button" data-action="randomize">Быстрый враг</button>
        <button type="button" data-action="reset">Сбросить</button>
        <output class="save-status" data-output="saveStatus">Сохранено локально</output>
      </section>

      <div class="workspace">
        <section class="left-column">
          <section class="paper identity-panel">
            <div class="section-head">
              <h2>Кто это</h2>
              <label class="wild-card-toggle">
                <input type="checkbox" data-bind="wildCard" />
                <span>Дикая карта</span>
              </label>
            </div>
            <div class="field-grid">
              <label class="wide">
                <span>Имя</span>
                <input data-bind="name" placeholder="Безымянный стрелок" autocomplete="off" />
              </label>
              <label>
                <span>Тип</span>
                <select data-bind="kind">
                  <option>Человек</option>
                  <option>Животное</option>
                  <option>Нежить</option>
                  <option>Маниту</option>
                  <option>Конструкт</option>
                  <option>Монстр</option>
                </select>
              </label>
              <label>
                <span>Ранг</span>
                <select data-bind="rank">
                  <option>Новичок</option>
                  <option>Закаленный</option>
                  <option>Ветеран</option>
                  <option>Герой</option>
                  <option>Легенда</option>
                </select>
              </label>
              <label>
                <span>Роль</span>
                <select data-bind="role">
                  <option>Массовка</option>
                  <option>Стрелок</option>
                  <option>Громила</option>
                  <option>Лидер</option>
                  <option>Мистик</option>
                  <option>Чудовище</option>
                </select>
              </label>
              <label>
                <span>Размер</span>
                <input type="number" data-bind="size" min="-4" max="8" step="1" />
              </label>
            </div>
          </section>

          <section class="paper trait-panel">
            <div class="section-head">
              <h2>Параметры</h2>
              <button type="button" data-action="normalizeTraits">Выровнять</button>
            </div>
            <div class="traits-grid" data-traits></div>
          </section>

          <section class="paper skill-panel">
            <div class="section-head">
              <h2>Навыки</h2>
              <button type="button" data-action="addSkill">Добавить</button>
            </div>
            <div class="skill-list" data-skills></div>
          </section>
        </section>

        <section class="center-column">
          <section class="score-panel">
            <article class="score-card paper">
              <img src="assets/Protection+.png" alt="" />
              <span>Защита</span>
              <output data-output="parry">2</output>
            </article>
            <article class="score-card paper">
              <img src="assets/Durability+.png" alt="" />
              <span>Стойкость</span>
              <output data-output="toughness">4</output>
            </article>
            <article class="score-card paper">
              <img src="assets/Boots.png" alt="" />
              <span>Шаг</span>
              <output data-output="pace">6</output>
            </article>
            <article class="score-card paper">
              <img src="assets/Run.png" alt="" />
              <span>Бег</span>
              <output data-output="runDie">d6</output>
            </article>
          </section>

          <section class="paper combat-panel">
            <div class="section-head">
              <h2>Боевые правки</h2>
              <span class="hint">Финальные значения считаются автоматически</span>
            </div>
            <div class="field-grid compact">
              <label>
                <span>Броня</span>
                <input type="number" data-bind="armor" min="0" max="20" step="1" />
              </label>
              <label>
                <span>Бонус защиты</span>
                <input type="number" data-bind="parryBonus" min="-6" max="12" step="1" />
              </label>
              <label>
                <span>Бонус стойкости</span>
                <input type="number" data-bind="toughnessBonus" min="-6" max="20" step="1" />
              </label>
              <label>
                <span>Шаг</span>
                <input type="number" data-bind="pace" min="0" max="24" step="1" />
              </label>
              <label>
                <span>Бег</span>
                <select data-bind="runDie">
                  <option>d4</option>
                  <option>d6</option>
                  <option>d8</option>
                  <option>d10</option>
                  <option>d12</option>
                </select>
              </label>
              <label>
                <span>Страх</span>
                <input data-bind="fear" placeholder="- / -2 / -4" />
              </label>
              <label>
                <span>Выдержка</span>
                <input type="number" data-bind="grit" min="0" max="10" step="1" />
              </label>
              <label>
                <span>Фишки</span>
                <input type="number" data-bind="bennies" min="0" max="6" step="1" />
              </label>
            </div>
          </section>

          <section class="paper attack-panel">
            <div class="section-head">
              <h2>Атаки</h2>
              <button type="button" data-action="addAttack">Добавить</button>
            </div>
            <div class="attack-list" data-attacks></div>
          </section>

          <section class="paper ability-panel">
            <div class="section-head">
              <h2>Особенности</h2>
              <button type="button" data-action="addAbility">Добавить</button>
            </div>
            <div class="ability-list" data-abilities></div>
          </section>
        </section>

        <aside class="right-column">
          <section class="paper marshal-card">
            <div class="section-head">
              <h2>Статблок</h2>
              <span class="badge" data-output="threat">Обычный</span>
            </div>
            <pre data-output="statblock"></pre>
          </section>

          <section class="paper notes-panel">
            <h2>Заметки маршала</h2>
            <textarea data-bind="notes" placeholder="Тактика, улики, слабости, добыча..."></textarea>
          </section>
        </aside>
      </div>
    </main>

    <script src="js/app.js" defer></script>
  </body>
</html>
